# ============================================
# RentaCar ESV - Configuración de Producción
# ============================================

server.port=8091

# Zona horaria de El Salvador
spring.jackson.time-zone=America/El_Salvador

# Desactivar DevTools y browser launch
spring.devtools.restart.enabled=false
vaadin.launch-browser=false

# Logging - menos verbose en producción
logging.level.org.atmosphere=warn
logging.level.org.springframework.boot.autoconfigure=error
logging.level.org.hibernate.SQL=warn
logging.level.com.rentacaresv=info

spring.mustache.check-template-location=false

# MariaDB configuration
spring.datasource.url=jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_RENTA_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Producción: none para que Flyway maneje el esquema completamente
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=false

# Flyway Configuration - Manejo de migraciones en producción
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# Pool de conexiones (reducido para servidor con ~1GB RAM)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# Vaadin
vaadin.allowed-packages=com.vaadin,org.vaadin,com.flowingcode,com.rentacaresv
spring.jpa.defer-datasource-initialization=true
vaadin.pnpm.enable=true

# Producción mode para Vaadin
vaadin.productionMode=true

# Optimización de memoria para servidor con recursos limitados (~1GB RAM)
# Carga beans solo cuando se necesitan, reduce memoria inicial significativamente
spring.main.lazy-initialization=true

# Configuración de sesión
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

# Uploads públicos de reserva
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=45MB

# Compresión de respuestas
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Actuator Health Checks (solo health, sin info detallada en prod)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
