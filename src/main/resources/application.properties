server.port=8091
spring.devtools.restart.enabled=false

logging.level.org.atmosphere = warn
logging.level.org.springframework.boot.autoconfigure = error
spring.mustache.check-template-location = false

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=true

# MariaDB configuration.
spring.datasource.url = jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_RENTA_NAME}
spring.datasource.username = ${DB_USER}
spring.datasource.password = ${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto = update
spring.jpa.database-platform = org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=false

# To improve the performance during development.
# For more information https://vaadin.com/docs/latest/integrations/spring/configuration#special-configuration-parameters
vaadin.allowed-packages = com.vaadin,org.vaadin,com.flowingcode,com.rentacaressv
spring.jpa.defer-datasource-initialization = true
vaadin.pnpm.enable = true

# Digital Ocean Spaces Configuration
do.spaces.key=${DO_SPACES_KEY}
do.spaces.secret=${DO_SPACES_SECRET}
do.spaces.bucket=${DO_SPACES_BUCKET}
do.spaces.region=${DO_SPACES_REGION}
do.spaces.endpoint=${DO_SPACES_ENDPOINT}

# App Configuration
app.base-url=${APP_BASE_URL:http://localhost:8091}

# Uploads públicos de reserva: 4 imágenes de hasta 10MB c/u
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=45MB

# Email Configuration is now managed from the database via Settings
# Go to Configuration > Email Settings in the admin panel

# Google Calendar Configuration is also managed from the database via Settings
# Go to Configuration > Google Calendar in the admin panel
